name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          filename: stats/github-stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: codewithayuu
          template: classic
          base: header, activity, repositories, metadata
          config_timezone: Asia/Kolkata
          config_twemoji: true
          config_display: large
          config_octicon: true
          config_padding: 10%
          
      - name: Generate Top Languages
        uses: lowlighter/metrics@latest
        with:
          filename: stats/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: codewithayuu
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css, dockerfile
          plugin_languages_details: percentage, lines
          plugin_languages_limit: 10
          plugin_languages_analysis_timeout: 15
          
      - name: Generate Trophies
        uses: lowlighter/metrics@latest
        with:
          filename: stats/trophies.svg
          token: ${{ secrets.GITHUB_TOKEN }}
          user: codewithayuu
          template: classic
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          
      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats/
          git diff --staged --quiet || git commit -m "Update GitHub stats"
          git pull --rebase origin main || true
          git push
